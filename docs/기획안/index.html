<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remnants of Light - 기획안 통합 문서</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --bg-dark: #0a0c10;
            --glass-bg: rgba(26, 29, 36, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #ef4444;
            --primary-hover: #dc2626;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(239, 68, 68, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(239, 68, 68, 0.08), transparent 25%);
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .sidebar-header p {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem;
        }

        .nav-menu::-webkit-scrollbar {
            width: 4px;
        }
        .nav-menu::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 0.875rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(4px);
        }

        .nav-item.active {
            color: #fff;
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            box-shadow: inset 4px 0 0 var(--primary-accent);
        }

        .nav-icon {
            margin-right: 0.75rem;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-bar {
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            justify-content: space-between;
        }

        .current-page-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .content-frame-wrapper {
            flex: 1;
            position: relative;
            padding: 1rem;
            background: var(--bg-dark);
        }

        .content-frame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
            background: #0f1115; /* Match internal bg */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .content-frame.loaded {
            opacity: 1;
        }

        /* Loading Spinner */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(239, 68, 68, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary-accent);
            animation: spin 1s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Mobile Toggle */
        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .mobile-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>Remnants of Light</h1>
            <p>기획안 통합 대시보드</p>
        </div>
        <nav class="nav-menu" id="nav-menu">
            <div class="nav-item active" data-target="전체_게임_기획안.html" data-title="전체 게임 기획안">
                <span class="nav-icon">📊</span>
                전체 게임 기획안
            </div>
            <div class="nav-item" data-target="세계관_및_고유명사_설정.html" data-title="세계관 및 고유명사 설정">
                <span class="nav-icon">🌍</span>
                세계관 및 고유명사
            </div>
            <div class="nav-item" data-target="전체_스토리.html" data-title="전체 스토리">
                <span class="nav-icon">📖</span>
                전체 스토리
            </div>
            <div class="nav-item" data-target="전체_몬스터_기획.html" data-title="전체 몬스터 기획">
                <span class="nav-icon">🐉</span>
                몬스터 기획
            </div>
            <div class="nav-item" data-target="기능_구현_명세서.html" data-title="기능 구현 명세서">
                <span class="nav-icon">⚙️</span>
                기능 구현 명세서
            </div>
            <div class="nav-item" data-target="Stage1_5주차_일정표.html" data-title="Stage 1 - 5주차 일정표">
                <span class="nav-icon">📅</span>
                5주차 개발 일정
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <button class="mobile-toggle" id="mobile-toggle">☰</button>
            <div class="current-page-title" id="page-title">
                <span class="nav-icon">📊</span> 전체 게임 기획안
            </div>
            <div style="font-size: 0.8rem; color: var(--text-muted);">
                Ver 1.0 (Vercel Ready)
            </div>
        </header>

        <div class="content-frame-wrapper">
            <div class="loader" id="loader"></div>
            <iframe 
                src="전체_게임_기획안.html" 
                class="content-frame" 
                id="content-frame"
                title="Content Viewer"
                onload="this.classList.add('loaded'); document.getElementById('loader').style.display='none';">
            </iframe>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navItems = document.querySelectorAll('.nav-item');
            const iframe = document.getElementById('content-frame');
            const pageTitle = document.getElementById('page-title');
            const loader = document.getElementById('loader');
            const mobileToggle = document.getElementById('mobile-toggle');
            const sidebar = document.getElementById('sidebar');

            // Handle navigation clicks
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    // Update active state
                    document.querySelector('.nav-item.active').classList.remove('active');
                    item.classList.add('active');

                    // Update Title
                    const icon = item.querySelector('.nav-icon').innerText;
                    const title = item.getAttribute('data-title');
                    pageTitle.innerHTML = `<span class="nav-icon">${icon}</span> ${title}`;

                    // Load new content
                    const target = item.getAttribute('data-target');
                    iframe.classList.remove('loaded');
                    loader.style.display = 'block';
                    iframe.src = target;

                    // Close sidebar on mobile
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('open');
                    }
                });
            });

            // Mobile menu toggle
            mobileToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });
        });
    </script>
</body>
</html>
